[env]
MISE_USE_VERSIONS_HOST = "0"

[tools]
actionlint = "latest"
hk = "latest"
lua = "5.1"
lua-language-server = "latest"
pkl = "latest"
stylua = "latest"

[tasks.format]
description = "Format Lua scripts"
run = "stylua metadata.lua hooks/"

[tasks.lint]
description = "Lint Lua scripts and GitHub Actions using hk"
run = "hk check"

[tasks.lint-fix]
description = "Fix linting issues"
run = "hk fix"

[tasks."test:unit"]
description = "Run busted unit tests"
run = '''
eval "$(luarocks --tree=lua_modules path)"
exec lua_modules/bin/busted spec/
'''

[tasks."test:setup"]
description = "Install busted into project lua_modules"
run = "luarocks install --tree=lua_modules busted"

[tasks.ci]
description = "Run all CI checks"
depends = ["lint", "test:unit", "test"]
