name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  MISE_EXPERIMENTAL: 1

jobs:
  ci:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Bootstrap test deps
        run: |
          mise run test:setup || {
            echo "Trying system luarocks..."
            if [ "$RUNNER_OS" = "macOS" ]; then
              brew install luarocks
            else
              sudo apt-get update && sudo apt-get install -y luarocks
            fi
            mise run test:setup
          }
      - name: Run CI
        run: mise run ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
